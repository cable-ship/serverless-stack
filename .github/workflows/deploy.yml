name: Deploy — Multi-Region Serverless Stack

on:
  push:
    branches: [main]

env:
  TF_VERSION: "1.7.5"
  PYTHON_VERSION: "3.12"
  TF_WORKING_DIR: terraform/environments/dev
  AWS_REGION: us-east-1

permissions:
  id-token: write    # required for GitHub OIDC → AWS
  contents: read
  pull-requests: write

jobs:
  lint-and-validate:
    name: "Lint & Validate"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.0
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Check all modules from repo root so none are missed
      - name: Terraform Format Check
        run: terraform fmt -check -recursive terraform/

      # Validates HCL syntax without hitting AWS
      - name: Terraform Init (local, no backend)
        run: terraform init -backend=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flake8
        run: pip install flake8

      - name: Lint Lambda sources
        run: |
          flake8 services/greeter-lambda/app.py \
                 services/dispatcher-lambda/app.py \
                 --max-line-length=100

  security-scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    needs: lint-and-validate

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      # tfsec — Terraform-specific security scanner
      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: true
          format: lovely

      # checkov — broader CIS / NIST policy library
      - name: Setup Python for checkov
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install checkov
        run: pip install checkov

      - name: checkov scan
        run: |
          checkov \
            --directory terraform \
            --framework terraform \
            --output cli \
            --soft-fail \
            --skip-check CKV_AWS_116,CKV_AWS_117

  plan-and-deploy:
    name: "Terraform Plan and Deploy"
    runs-on: ubuntu-latest
    environment: Test
    needs: [security-scan]
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: us-east-1
            region: us-east-1
            var_file: us-east-1/terraform.tfvars
            state_key: aws-assessment/dev/us-east-1.tfstate
          - name: eu-west-1
            region: eu-west-1
            var_file: eu-west-1/terraform.tfvars
            state_key: aws-assessment/dev/eu-west-1.tfstate

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.0
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # - name: Configure AWS credentials
        # uses: aws-actions/configure-aws-credentials@v4.1.0
        # with:
        #   aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        #   aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        #   aws-region: ${{ matrix.target.region }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ matrix.target.region }}

      - name: Build Lambda packages
        run: |
          cd services/greeter-lambda   && zip -j greeter.zip app.py
          cd ../dispatcher-lambda      && zip -j dispatcher.zip app.py

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ matrix.target.state_key }}"
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="${{ matrix.target.var_file }}" \
            -var="user_email=${{ secrets.TF_VAR_USER_EMAIL }}" \
            -var="repo_url=${{ secrets.TF_VAR_REPO_URL }}" \
            -no-color \
            -out=tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        run: |
          terraform apply \
            -auto-approve \
            tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

  integration-tests:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    environment: Test
    needs: [plan-and-deploy]
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: us-east-1
            region: us-east-1
            var_file: us-east-1/terraform.tfvars
            state_key: aws-assessment/dev/us-east-1.tfstate
          - name: eu-west-1
            region: eu-west-1
            var_file: eu-west-1/terraform.tfvars
            state_key: aws-assessment/dev/eu-west-1.tfstate

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Setup Terraform (to read outputs)
        uses: hashicorp/setup-terraform@v4.0.0
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4.1.0
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: ${{ matrix.target.region }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ matrix.target.region }}

      - name: Terraform Init (to read outputs)
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ matrix.target.state_key }}"
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Run integration tests
        env:
          TEST_USERNAME: ${{ secrets.TEST_USERNAME || secrets.TF_VAR_USER_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TF_VAR_USER_EMAIL: ${{ secrets.TF_VAR_USER_EMAIL }}
          TEST_REGION: ${{ matrix.target.region }}
          TF_VAR_FILE: ${{ matrix.target.var_file }}
        run: chmod +x scripts/test_endpoints.sh && ./scripts/test_endpoints.sh